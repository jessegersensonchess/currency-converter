apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-converter
  namespace: local-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: currency-converter
  template:
    metadata:
      labels:
        app: currency-converter
    spec:
      containers:
        - name: currency-converter
          image: currency-converter:c3a93f5
          imagePullPolicy: Never
          env:
            - name: CURRENCY_CONVERTER_PORT
              value: "18880"
          ports:
            - containerPort: 18880
              name: http
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "5m"
              memory: "8Mi"
            limits:
              cpu: "20m"
              memory: "16Mi"
          readinessProbe:
            tcpSocket:
              port: 18880
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 18880
            initialDelaySeconds: 1
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: currency-converter
  namespace: local-services
spec:
  selector:
    app: currency-converter
  ports:
    - name: http
      port: 18880
      targetPort: 18880
      nodePort: 31880
  type: NodePort
